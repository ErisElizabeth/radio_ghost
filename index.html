<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Radio Ghost</title>
    <link rel="stylesheet" href="styles.css?v=0.1.0-alpha.2" />
  </head>
  <body>
    <main class="app-shell">
      <section class="topbar">
        <div>
          <h1>Radio Ghost</h1>
          <p id="status">Ready to record</p>
        </div>
        <span class="badge">Standalone web app</span>
      </section>

      <section class="recorder-panel">
        <div class="meter-wrap" aria-label="Input level">
          <canvas id="meter" width="760" height="160"></canvas>
        </div>

        <div class="timer" id="timer">00:00.0</div>

        <div class="controls">
          <button id="recordBtn" class="primary" type="button">Record</button>
          <button id="importBtn" type="button">Import</button>
          <button id="stopBtn" type="button" disabled>Stop</button>
          <button id="playBtn" type="button" disabled>Play</button>
          <button id="exportWavBtn" type="button" disabled>Export WAV</button>
          <button id="exportMp3Btn" type="button" disabled>Export MP3</button>
        </div>
        <input id="fileInput" type="file" accept=".wav,.mp3,audio/wav,audio/mpeg" hidden />

        <audio id="player" controls></audio>
      </section>
    </main>

    <script src="lame.min.js?v=0.1.0-alpha.2"></script>
    <script src="renderer.js?v=0.1.0-alpha.2"></script>
  </body>
</html>
