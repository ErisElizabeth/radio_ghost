<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Radio Ghost</title>
    <link rel="stylesheet" href="styles.css?v=0.1.0-alpha.10" />
  </head>
  <body>
    <nav class="menu-bar" aria-label="Application menu">
      <div class="menu">
        <button id="fileMenuButton" class="menu-button" type="button">File</button>
        <div class="menu-list" aria-label="File menu">
          <button id="importCommand" class="menu-command" type="button">Import</button>
          <div id="exportMenuItem" class="menu-command submenu">
            <span>Export</span>
            <span aria-hidden="true">></span>
            <div class="submenu-list" aria-label="Export menu">
              <button id="exportWavCommand" class="menu-command" type="button" disabled>
                WAV
              </button>
              <button id="exportMp3Command" class="menu-command" type="button" disabled>
                MP3
              </button>
            </div>
          </div>
        </div>
      </div>
      <div class="window-controls" aria-label="Window controls">
        <button class="window-control" type="button" aria-label="Minimize" title="Minimize">-</button>
        <button class="window-control" type="button" aria-label="Maximize" title="Maximize">[]</button>
        <button class="window-control close" type="button" aria-label="Close" title="Close">X</button>
      </div>
    </nav>

    <main class="app-shell">
      <header class="topbar">
        <div>
          <h1>Radio Ghost</h1>
          <p id="status">Ready to record</p>
        </div>
        <div class="ghost-signal" aria-hidden="true">
          <svg viewBox="0 0 1000 180" preserveAspectRatio="none">
            <defs>
              <linearGradient id="waveTaper" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="black" stop-opacity="0" />
                <stop offset="14%" stop-color="white" stop-opacity="1" />
                <stop offset="86%" stop-color="white" stop-opacity="1" />
                <stop offset="100%" stop-color="black" stop-opacity="0" />
              </linearGradient>

              <mask id="taperMask">
                <rect width="100%" height="100%" fill="url(#waveTaper)" />
              </mask>
            </defs>

            <g class="wave-bob" mask="url(#taperMask)">
              <path
                class="wave wave-soft-glow"
                d="M 0 90
                   C 50 74, 100 74, 150 90
                   C 200 106, 250 106, 300 90
                   C 350 74, 400 74, 450 90
                   C 500 106, 550 106, 600 90
                   C 650 74, 700 74, 750 90
                   C 800 106, 850 106, 900 90
                   C 950 74, 1000 74, 1050 90"
              />
              <path
                class="wave wave-core"
                d="M 0 90
                   C 50 74, 100 74, 150 90
                   C 200 106, 250 106, 300 90
                   C 350 74, 400 74, 450 90
                   C 500 106, 550 106, 600 90
                   C 650 74, 700 74, 750 90
                   C 800 106, 850 106, 900 90
                   C 950 74, 1000 74, 1050 90"
              />
            </g>
          </svg>
        </div>
      </header>

      <section class="recorder-panel" aria-label="Recorder">
        <div class="meter-wrap" aria-label="Input level">
          <canvas id="meter" width="760" height="160"></canvas>
        </div>

        <div class="timer" id="timer">00:00.0</div>

        <div class="controls">
          <button id="recordButton" class="icon-button record-button" type="button" aria-label="Record" title="Record">
            <span class="button-icon mic-icon" aria-hidden="true"></span>
          </button>
          <button id="stopButton" class="icon-button stop-button" type="button" aria-label="Stop" title="Stop" disabled>
            <span class="button-icon stop-icon" aria-hidden="true"></span>
          </button>
          <button id="playButton" class="icon-button play-button" type="button" aria-label="Play" title="Play" disabled>
            <span class="button-icon play-icon" aria-hidden="true"></span>
          </button>
        </div>

        <input id="fileInput" type="file" accept=".wav,.mp3,audio/wav,audio/mpeg" hidden />
        <audio id="audioPlayer" controls></audio>
      </section>
    </main>

    <script src="vendor/lame.min.js?v=0.1.0-alpha.10"></script>
    <script src="renderer.js?v=0.1.0-alpha.10"></script>
  </body>
</html>
