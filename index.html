<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Radio Ghost</title>
    <link rel="stylesheet" href="styles.css?v=0.1.0-alpha.2" />
  </head>
  <body>
    <nav class="menu-bar" aria-label="Application menu">
      <div class="menu-item">
        <button class="menu-trigger" type="button" aria-haspopup="true" aria-expanded="false">
          File
        </button>
        <div class="menu-panel" role="menu">
          <button id="menuImportBtn" class="menu-command" type="button" role="menuitem">
            Import
          </button>
          <div class="menu-command has-submenu" role="menuitem" aria-haspopup="true">
            <span>Export</span>
            <span aria-hidden="true">></span>
            <div class="submenu-panel" role="menu">
              <button id="menuExportWavBtn" class="menu-command" type="button" role="menuitem" disabled>
                WAV
              </button>
              <button id="menuExportMp3Btn" class="menu-command" type="button" role="menuitem" disabled>
                MP3
              </button>
            </div>
          </div>
        </div>
      </div>
    </nav>

    <main class="app-shell">
      <section class="topbar">
        <div>
          <h1>Radio Ghost</h1>
          <p id="status">Ready to record</p>
        </div>
        <span class="badge">Standalone web app</span>
      </section>

      <section class="recorder-panel">
        <div class="meter-wrap" aria-label="Input level">
          <canvas id="meter" width="760" height="160"></canvas>
        </div>

        <div class="timer" id="timer">00:00.0</div>

        <div class="controls">
          <button id="recordBtn" class="primary" type="button">Record</button>
          <button id="stopBtn" type="button" disabled>Stop</button>
          <button id="playBtn" type="button" disabled>Play</button>
        </div>
        <input id="fileInput" type="file" accept=".wav,.mp3,audio/wav,audio/mpeg" hidden />

        <audio id="player" controls></audio>
      </section>
    </main>

    <script src="lame.min.js?v=0.1.0-alpha.2"></script>
    <script src="renderer.js?v=0.1.0-alpha.2"></script>
  </body>
</html>
